<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .joke-display {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 1.2em;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }

        .joke-setup {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .joke-punchline {
            margin-top: 15px;
            font-style: italic;
            color: #667eea;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        .error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
            background: #fadbd8;
            border-radius: 10px;
            border-left: 5px solid #e74c3c;
        }

        .joke-type {
            text-align: center;
            margin-top: 15px;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .joke-text {
                font-size: 1em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div class="joke-display" id="jokeDisplay">
            <div class="loading">Loading a funny joke for you...</div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="getJoke()">Get New Joke 🎲</button>
            <button class="btn-secondary" onclick="copyJoke()">Copy 📋</button>
        </div>

        <div class="joke-type" id="jokeType"></div>
    </div>

    <script>
        let currentJoke = {};

        // Fetch a random joke from the API
        async function getJoke() {
            const jokeDisplay = document.getElementById('jokeDisplay');
            const jokeTypeEl = document.getElementById('jokeType');
            
            jokeDisplay.innerHTML = '<div class="loading">Loading a funny joke for you...</div>';
            jokeTypeEl.innerHTML = '';

            try {
                // Using the JokeAPI (https://jokeapi.dev/)
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?format=json');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();
                currentJoke = data;

                if (data.type === 'twopart') {
                    jokeDisplay.innerHTML = `
                        <div class="joke-text">
                            <div class="joke-setup">${escapeHtml(data.setup)}</div>
                            <div class="joke-punchline">${escapeHtml(data.delivery)}</div>
                        </div>
                    `;
                } else {
                    jokeDisplay.innerHTML = `
                        <div class="joke-text">
                            ${escapeHtml(data.joke)}
                        </div>
                    `;
                }

                jokeTypeEl.innerHTML = `Category: <strong>${data.category}</strong> | Type: <strong>${data.type}</strong>`;
            } catch (error) {
                jokeDisplay.innerHTML = `
                    <div class="error">
                        <strong>Oops!</strong> Failed to load a joke. Please try again later.<br>
                        <small>${escapeHtml(error.message)}</small>
                    </div>
                `;
                jokeTypeEl.innerHTML = '';
            }
        }

        // Copy joke to clipboard
        function copyJoke() {
            let jokeText = '';
            
            if (currentJoke.type === 'twopart') {
                jokeText = `${currentJoke.setup}\n${currentJoke.delivery}`;
            } else {
                jokeText = currentJoke.joke;
            }

            if (!jokeText) {
                alert('Please load a joke first!');
                return;
            }

            navigator.clipboard.writeText(jokeText).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied! ✓';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                alert('Failed to copy to clipboard');
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load a joke when the page loads
        window.addEventListener('load', getJoke);

        // Allow Enter key to get new joke
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                getJoke();
            }
        });
    </script>
</body>
</html>
